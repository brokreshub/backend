services:
  - type: web
    name: broker-hub-api
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CASHFREE_API_KEY
        sync: false
      - key: CASHFREE_SECRET_KEY
        sync: false
      - key: FAST2SMS_API_KEY
        sync: false 